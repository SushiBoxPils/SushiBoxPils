<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SushiBoxPils</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:Poppins,sans-serif;background:#050505;color:white;padding-bottom:95px}

/* HEADER */
header{min-height:105px;padding:18px 55px;background:#000;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #222;position:sticky;top:0;z-index:20}
.logo-wrap img{width:145px;max-height:90px;object-fit:contain}
nav a{color:white;text-decoration:none;margin:0 14px;font-size:14px;font-weight:700;text-transform:uppercase}
nav a:hover{color:#e11d2e}
.btn{display:inline-block;padding:14px 24px;border-radius:8px;text-decoration:none;color:white;font-weight:700;text-transform:uppercase;font-size:14px;border:none;cursor:pointer}
.btn-red{background:#df1f2d}
.btn-border{border:1px solid #c56b35;background:transparent}
.header-actions{display:flex;gap:12px}

/* HERO */
.hero{min-height:620px;background:linear-gradient(90deg,rgba(0,0,0,.96),rgba(0,0,0,.78),rgba(0,0,0,.25)),url('https://images.unsplash.com/photo-1617196034796-73dfa7b1fd56?q=80&w=1600&auto=format&fit=crop');background-size:cover;background-position:center right;padding:70px 60px;display:flex;align-items:center}
.hero-content{max-width:560px}
.hero h1{font-family:'Playfair Display',serif;font-size:78px;line-height:1}
.hero h1 span{color:#df1f2d}
.slogan{color:#c9974c;font-weight:700;letter-spacing:2px;font-size:15px;margin:18px 0;text-transform:uppercase}
.hero p{font-size:19px;line-height:1.8;color:#e5e5e5;margin-bottom:30px}
.hero-buttons{display:flex;gap:18px;margin-bottom:35px}
.features-small{display:flex;gap:24px;flex-wrap:wrap;color:#d77b3b;font-size:13px;text-transform:uppercase}

/* SECTION */
.cards-section{padding:40px 55px 70px;background:linear-gradient(180deg,#080808,#030303)}

.section-title{text-align:center;margin-bottom:40px}
.section-title h2{font-size:32px;text-transform:uppercase}
.line{width:70px;height:3px;background:#df1f2d;margin:15px auto 0}

/* MENU */
.menu-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:26px}
.menu-card{border:1px solid rgba(255,255,255,.14);border-radius:12px;overflow:hidden;background:#090909;text-align:center}
.menu-card img{width:100%;height:165px;object-fit:cover}
.menu-card-content{padding:22px 14px}
.menu-card h3{text-transform:uppercase;margin-bottom:12px}
.menu-card p{color:#ddd;font-size:14px;min-height:48px}
.price{color:#ff2c2c;font-size:22px;font-weight:800;margin:15px 0}
.add-btn{background:#df1f2d;color:white;border:none;border-radius:8px;padding:12px 18px;font-weight:700;cursor:pointer;width:100%}

/* CUSTOMER */
.customer-box{margin-top:35px;border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:22px;background:#090909}
.customer-box h3{margin-bottom:15px}
.customer-box input,.customer-box textarea{width:100%;padding:13px;margin-bottom:10px;border-radius:8px;border:1px solid #333;background:#111;color:white}

/* NEW: ORDER STATUS */
#orderStatusBox{margin-top:20px;border:1px solid #df1f2d;padding:18px;border-radius:12px;background:#0c0c0c}

/* CART */
.cart{position:fixed;left:0;right:0;bottom:0;background:#000;border-top:1px solid #333;padding:12px 15px;z-index:30}
.cart-top{display:flex;justify-content:space-between;margin-bottom:10px}
.cart-details{display:none;background:#111;padding:10px;border-radius:10px;margin-bottom:10px;max-height:160px;overflow:auto}
.cart-line{display:flex;justify-content:space-between;border-bottom:1px solid #222;padding:7px 0;font-size:14px}
.cart-line button{background:transparent;color:#ff5555;border:none;font-weight:bold}
.cart button.send{width:100%;padding:14px;background:#df1f2d;color:white;border:none;border-radius:8px;font-weight:700}
</style>
</head>

<body>

<header>
  <div class="logo-wrap"><img src="logo.png"></div>
  <nav>
    <a href="#">Domů</a>
    <a href="#menu">Menu</a>
    <a href="#kontakt">Kontakt</a>
  </nav>
</header>

<section class="cards-section">

  <div class="section-title" id="menu">
    <h2>Menu</h2>
    <div class="line"></div>
  </div>

  <div class="menu-grid" id="menuGrid">Načítám menu...</div>

  <div class="customer-box">
    <h3>Údaje k objednávce</h3>
    <input id="customerName" placeholder="Jméno">
    <input id="customerPhone" placeholder="Telefon">
    <textarea id="customerNote" placeholder="Poznámka"></textarea>
  </div>

  <!-- NEW STATUS -->
  <div id="orderStatusBox" style="display:none">
    <h3>Stav objednávky</h3>
    <p>Kód: <b id="orderCode"></b></p>
    <p>Stav: <b id="orderStatusText">Nová objednávka</b></p>
  </div>

</section>

<div class="cart">
  <div class="cart-details" id="cartDetails"></div>
  <div class="cart-top">
    <strong><span id="cartCount">0</span> ks</strong>
    <strong><span id="cartTotal">0</span> Kč</strong>
  </div>
  <button class="send" onclick="sendOrder()">Objednat</button>
</div>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCECFacCTVZpt9EM5HyDF98cVSrJNrIw9A",
  authDomain: "sushiboxpils.firebaseapp.com",
  projectId: "sushiboxpils",
  storageBucket: "sushiboxpils.firebasestorage.app",
  messagingSenderId: "296051969254",
  appId: "1:296051969254:web:cce432ad7060cbc32a3f27"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [];
let cart = [];

/* LOAD MENU */
onSnapshot(collection(db,"products"), (snapshot)=>{
  const menuGrid = document.getElementById("menuGrid");
  products = [];
  menuGrid.innerHTML = "";

  if(snapshot.empty){
    menuGrid.innerHTML = "<p>Menu prázdné</p>";
    return;
  }

  snapshot.forEach(docSnap=>{
    const item = { id: docSnap.id, ...docSnap.data() };
    products.push(item);

    menuGrid.innerHTML += `
    <div class="menu-card">
      ${item.img ? `<img src="${item.img}">` : ""}
      <div class="menu-card-content">
        <h3>${item.name}</h3>
        <p>${item.desc || ""}</p>
        <div class="price">${item.price} Kč</div>
        <button class="add-btn" onclick="addToCart('${item.id}')">Přidat</button>
      </div>
    </div>`;
  });
});

/* CART */
window.addToCart = (id)=>{
  const product = products.find(p=>p.id===id);
  const existing = cart.find(i=>i.id===id);

  if(existing) existing.qty++;
  else cart.push({...product, qty:1});

  updateCart();
};

window.removeFromCart = (id)=>{
  cart = cart.filter(i=>i.id!==id);
  updateCart();
};

function updateCart(){
  const count = cart.reduce((s,i)=>s+i.qty,0);
  const total = cart.reduce((s,i)=>s+i.qty*i.price,0);

  document.getElementById("cartCount").innerText = count;
  document.getElementById("cartTotal").innerText = total;

  const details = document.getElementById("cartDetails");
  details.innerHTML="";

  if(cart.length){
    details.style.display="block";

    cart.forEach(item=>{
      details.innerHTML += `
      <div class="cart-line">
        <span>${item.qty}× ${item.name}</span>
        <span>${item.qty * item.price} Kč 
        <button onclick="removeFromCart('${item.id}')">✕</button></span>
      </div>`;
    });

  } else {
    details.style.display="none";
  }
}

/* SEND ORDER + TRACK STATUS */
window.sendOrder = async ()=>{
  if(cart.length===0){
    alert("Košík prázdný");
    return;
  }

  const name = document.getElementById("customerName").value || "-";
  const phone = document.getElementById("customerPhone").value || "-";
  const note = document.getElementById("customerNote").value || "-";

  const total = cart.reduce((s,i)=>s+i.qty*i.price,0);

  const orderRef = await addDoc(collection(db,"orders"),{
    customerName:name,
    customerPhone:phone,
    customerNote:note,
    items: cart.map(i=>({
      id:i.id,
      name:i.name,
      price:i.price,
      qty:i.qty,
      lineTotal:i.qty*i.price
    })),
    total: total,
    status:"new",
    createdAt: serverTimestamp()
  });

  /* SHOW ORDER STATUS */
  document.getElementById("orderStatusBox").style.display="block";
  document.getElementById("orderCode").innerText = orderRef.id;

  onSnapshot(doc(db,"orders",orderRef.id),(snap)=>{
    if(!snap.exists()) return;

    const o = snap.data();
    let text = "Nová objednávka";

    if(o.status==="preparing") text="Připravuje se";
    if(o.status==="done") text="Hotovo k vyzvednutí";

    document.getElementById("orderStatusText").innerText = text;
  });

  /* RESET */
  cart=[];
  updateCart();
  document.getElementById("customerName").value="";
  document.getElementById("customerPhone").value="";
  document.getElementById("customerNote").value="";

  alert("Objednávka odeslána!");
};
</script>

</body>
</html>
