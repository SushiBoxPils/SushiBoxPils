<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SushiBoxPils</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:Poppins,sans-serif;background:#050505;color:white;padding-bottom:95px}
header{min-height:105px;padding:18px 55px;background:#000;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #222;position:sticky;top:0;z-index:20}
.logo-wrap img{width:145px;max-height:90px;object-fit:contain}
nav a{color:white;text-decoration:none;margin:0 14px;font-size:14px;font-weight:700;text-transform:uppercase}
nav a:hover{color:#e11d2e}
.btn{display:inline-block;padding:14px 24px;border-radius:8px;text-decoration:none;color:white;font-weight:700;text-transform:uppercase;font-size:14px;border:none;cursor:pointer}
.btn-red{background:#df1f2d}
.btn-border{border:1px solid #c56b35;background:transparent}
.header-actions{display:flex;gap:12px}

.hero{min-height:620px;background:linear-gradient(90deg,rgba(0,0,0,.96),rgba(0,0,0,.78),rgba(0,0,0,.25)),url('https://images.unsplash.com/photo-1617196034796-73dfa7b1fd56?q=80&w=1600&auto=format&fit=crop');background-size:cover;background-position:center right;padding:70px 60px;display:flex;align-items:center}
.hero-content{max-width:560px}
.hero h1{font-family:'Playfair Display',serif;font-size:78px;line-height:1}
.hero h1 span{color:#df1f2d}
.slogan{color:#c9974c;font-weight:700;letter-spacing:2px;font-size:15px;margin:18px 0;text-transform:uppercase}
.hero p{font-size:19px;line-height:1.8;color:#e5e5e5;margin-bottom:30px}
.hero-buttons{display:flex;gap:18px;margin-bottom:35px}
.features-small{display:flex;gap:24px;flex-wrap:wrap;color:#d77b3b;font-size:13px;text-transform:uppercase}

.cards-section{padding:40px 55px 70px;background:linear-gradient(180deg,#080808,#030303)}
.service-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:28px;margin-bottom:70px}
.service-card{border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:35px 22px;text-align:center;background:rgba(255,255,255,.02)}
.service-card .icon{font-size:36px;margin-bottom:18px}
.service-card h3{margin-bottom:15px;text-transform:uppercase}
.service-card p{color:#ddd;line-height:1.7}

.section-title{text-align:center;margin-bottom:40px}
.section-title h2{font-size:32px;text-transform:uppercase}
.line{width:70px;height:3px;background:#df1f2d;margin:15px auto 0}

.menu-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:26px}
.menu-card{border:1px solid rgba(255,255,255,.14);border-radius:12px;overflow:hidden;background:#090909;text-align:center}
.menu-card img{width:100%;height:165px;object-fit:cover}
.menu-card-content{padding:22px 14px}
.menu-card h3{text-transform:uppercase;margin-bottom:12px}
.menu-card p{color:#ddd;font-size:14px;min-height:48px}
.price{color:#ff2c2c;font-size:22px;font-weight:800;margin:15px 0}
.add-btn{background:#df1f2d;color:white;border:none;border-radius:8px;padding:12px 18px;font-weight:700;cursor:pointer;width:100%}

.customer-box{margin-top:35px;border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:22px;background:#090909}
.customer-box h3{margin-bottom:15px}
.customer-box input,.customer-box textarea{width:100%;padding:13px;margin-bottom:10px;border-radius:8px;border:1px solid #333;background:#111;color:white}

.footer-info{margin-top:60px;border-top:1px solid rgba(255,255,255,.15);padding-top:40px;display:grid;grid-template-columns:repeat(4,1fr);gap:35px}
.info-box h3{text-transform:uppercase;margin-bottom:18px}
.info-box p{color:#cfcfcf;line-height:1.9;font-size:14px}
.info-icon{font-size:34px;margin-bottom:14px;color:#e3342f}
footer{padding:28px;text-align:center;color:#aaa;border-top:1px solid #222;background:#050505}

.cart{position:fixed;left:0;right:0;bottom:0;background:#000;border-top:1px solid #333;padding:12px 15px;z-index:30}
.cart-top{display:flex;justify-content:space-between;margin-bottom:10px}
.cart-details{display:none;background:#111;padding:10px;border-radius:10px;margin-bottom:10px;max-height:160px;overflow:auto}
.cart-line{display:flex;justify-content:space-between;border-bottom:1px solid #222;padding:7px 0;font-size:14px}
.cart-line button{background:transparent;color:#ff5555;border:none;font-weight:bold}
.cart button.send{width:100%;padding:14px;background:#df1f2d;color:white;border:none;border-radius:8px;font-weight:700}
</style>
</head>

<body>
<!-- PHẦN HTML GIỮ NGUYÊN NHƯ BẠN ĐÃ GỬI -->

</html>
