<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SushiBoxPils</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#070707;
    color:white;
}

header{
    background:#000;
    padding:20px;
    text-align:center;
}

h1{color:#e11d2e}

.menu{
    padding:15px;
    display:grid;
    grid-template-columns:1fr;
    gap:15px;
}

.item{
    background:#111;
    border:1px solid #222;
    border-radius:12px;
    overflow:hidden;
}

.item img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.item-content{
    padding:15px;
}

.price{
    color:#ff2c2c;
    font-size:20px;
    font-weight:bold;
}

@media(min-width:700px){
    .menu{grid-template-columns:1fr 1fr;}
}

@media(min-width:1000px){
    .menu{grid-template-columns:1fr 1fr 1fr;}
}
</style>
</head>

<body>

<header>
    <h1>SushiBoxPils</h1>
    <p>ČERSTVÉ SUSHI PRO KAŽDOU PŘÍLEŽITOST</p>
</header>

<section class="menu" id="menu"></section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCECFacCTVZpt9EM5HyDF98cVSrJNrIw9A",
  authDomain: "sushiboxpils.firebaseapp.com",
  projectId: "sushiboxpils",
  storageBucket: "sushiboxpils.firebasestorage.app",
  messagingSenderId: "296051969254",
  appId: "1:296051969254:web:cce432ad7060cbc32a3f27"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const menu = document.getElementById("menu");

onSnapshot(collection(db,"products"), (snapshot)=>{
    menu.innerHTML = "";

    snapshot.forEach(doc=>{
        const item = doc.data();

        menu.innerHTML += `
            <div class="item">
                ${item.img ? `<img src="${item.img}">` : ""}
                <div class="item-content">
                    <h3>${item.name}</h3>
                    <p>${item.desc || ""}</p>
                    <div class="price">${item.price} Kč</div>
                </div>
            </div>
        `;
    });
});
</script>

</body>
</html>
