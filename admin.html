<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin SushiBoxPils</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial;background:#070707;color:white;margin:0}

button{border:0;border-radius:10px;padding:10px 12px;font-weight:bold;cursor:pointer;color:white;background:#df1f2d}
input{width:100%;padding:10px;margin:6px 0;border-radius:10px;border:1px solid #333;background:#111;color:white}

#loginBox{max-width:400px;margin:90px auto;background:#111;padding:20px;border-radius:16px;text-align:center}
#adminPanel{display:none}

.topbar{background:#000;padding:12px;display:flex;justify-content:space-between}
.container{padding:15px}

#ordersList{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.order{
  background:#151515;
  border:1px solid #333;
  border-radius:14px;
  padding:12px;
  font-size:14px;
}

.orderTotal{color:#c9974c;font-size:18px;font-weight:bold}

.orderActions{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}
.orderActions button{font-size:12px;padding:6px 8px}

.confirm{background:#16a34a}
.work{background:#ca8a04}
.doneBtn{background:#2563eb}
.ship{background:#7c3aed}
.delete{background:#444}

/* PRINT */
@media print{
  body *{visibility:hidden}
  #printArea,#printArea *{visibility:visible}
  #printArea{
    position:absolute;
    left:0;
    top:0;
    width:80mm;
    background:white;
    color:black;
    padding:8px;
  }
}
#printArea{display:none}
</style>
</head>

<body>

<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Heslo">
  <button onclick="login()">Přihlásit</button>
</div>

<div id="adminPanel">
  <div class="topbar">
    <b>🍣 SushiBoxPils Admin</b>
    <button onclick="logout()">Odhlásit</button>
  </div>

  <div class="container">
    <h2>Objednávky</h2>
    <div id="ordersList"></div>
  </div>
</div>

<div id="printArea"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "sushiboxpils.firebaseapp.com",
  projectId: "sushiboxpils"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const ordersRef = collection(db,"orders");
const ordersQuery = query(ordersRef, orderBy("createdAt","desc"));

window.login = async ()=>{
  await signInWithEmailAndPassword(auth,email.value,password.value)
};
window.logout = async ()=>{ await signOut(auth) };

onAuthStateChanged(auth,(u)=>{
  loginBox.style.display = u?"none":"block";
  adminPanel.style.display = u?"block":"none";
});

function esc(str){
  return String(str||"").replace(/'/g,"&#39;");
}

/* IN HÓA ĐƠN */
window.printOrder = (order)=>{
  const o = JSON.parse(decodeURIComponent(order));

  let items="";
  o.items?.forEach(i=>{
    items+=`<p>${i.qty}x ${i.name} - ${i.lineTotal||i.qty*i.price} Kč</p>`;
  });

  printArea.innerHTML = `
    <div>
      <h3 style="text-align:center">SushiBoxPils</h3>
      <hr>
      <p>${o.customerName}</p>
      <p>${o.customerPhone}</p>
      <hr>
      ${items}
      <hr>
      <h2 style="text-align:right">${o.total} Kč</h2>
      <p style="text-align:center">Děkujeme!</p>
    </div>
  `;

  printArea.style.display="block";

  setTimeout(()=>{
    window.print();
    printArea.style.display="none";
  },300);
};

/* LOAD ORDERS */
onSnapshot(ordersQuery,snap=>{
  ordersList.innerHTML="";

  snap.forEach(d=>{
    const o=d.data();

    let items="";
    o.items?.forEach(i=>{
      items+=`<p>${i.qty}× ${i.name}</p>`;
    });

    const phoneEsc = esc(o.customerPhone);

    ordersList.innerHTML+=`
    <div class="order">
      <div class="orderTotal">${o.total} Kč</div>

      <p><b>${o.customerName||"-"}</b></p>
      <p>${o.customerPhone||"-"}</p>

      ${items}

      <div class="orderActions">
        <button class="confirm" onclick="printOrder('${encodeURIComponent(JSON.stringify(o))}')">In</button>
        <button class="work" onclick="updateStatus('${d.id}','preparing')">Làm</button>
        <button class="doneBtn" onclick="updateStatus('${d.id}','done')">Xong</button>
        <button class="ship" onclick="updateStatus('${d.id}','shipping')">Ship</button>
        <button class="delete" onclick="deleteOrder('${d.id}')">Xóa</button>
      </div>
    </div>`;
  });
});

window.updateStatus = async (id,status)=>{
  await updateDoc(doc(db,"orders",id),{status:status});
};

window.deleteOrder = async id=>{
  if(confirm("Smazat?")){
    await deleteDoc(doc(db,"orders",id));
  }
};
</script>

</body>
</html>
