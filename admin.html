<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin SushiBoxPils</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial;background:#070707;color:white;margin:0}
h1,h2,h3{margin:0 0 12px}
button{border:0;border-radius:10px;padding:12px 14px;font-weight:bold;cursor:pointer;color:white;background:#df1f2d}
input,textarea,select{width:100%;padding:13px;margin:7px 0 12px;border-radius:10px;border:1px solid #333;background:#111;color:white}

#loginBox{max-width:420px;margin:90px auto;background:#111;padding:26px;border-radius:18px;text-align:center;border:1px solid #333}
#adminPanel{display:none}

.topbar{position:sticky;top:0;z-index:10;background:#000;border-bottom:1px solid #222;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.logoTitle{color:#e11d2e;font-size:24px;font-weight:800}

.container{padding:18px;max-width:1400px;margin:auto}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}

.stat{background:#111;border:1px solid #2b2b2b;border-radius:16px;padding:18px}
.stat small{color:#aaa}
.stat strong{display:block;font-size:28px;margin-top:8px;color:#c9974c}

.layout{display:grid;grid-template-columns:360px 1fr;gap:18px}

.panel{background:#101010;border:1px solid #2b2b2b;border-radius:18px;padding:18px}

.notice{background:#181818;border:1px solid #333;padding:12px;border-radius:12px;margin-bottom:14px;color:#ddd}

.upload{background:#c9974c;color:#000}
.logout{background:#555}
.confirm{background:#16a34a}
.delete{background:#444}
.danger{background:#7f1d1d}

/* ✅ MENU GRID */
.menuGrid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
}

.item{
  border:1px solid #333;
  border-radius:16px;
  padding:10px;
  background:#151515;
  font-size:14px;
  transition:0.2s;
}

.item:hover{
  transform:scale(1.03);
}

.item img{
  width:100%;
  max-height:140px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:8px;
}

.order{border:1px solid #3a3a3a;border-radius:16px;padding:14px;margin:12px 0;background:#151515}
.order.new{border-color:#df1f2d;background:#16090a}
.order.confirmed{border-color:#16a34a}

.status{display:inline-block;padding:6px 10px;border-radius:20px;background:#7f1d1d;color:#fff;margin-bottom:10px;font-size:12px;font-weight:bold}
.status.done{background:#14532d}

.orderHead{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.orderTotal{font-size:22px;color:#c9974c;font-weight:800}

.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}

hr{border:0;border-top:1px solid #333;margin:12px 0}

.tabs{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.tab{background:#222}
.tab.active{background:#df1f2d}

.hidden{display:none}

/* 📱 Responsive */
@media(max-width:900px){
  .grid{grid-template-columns:1fr 1fr}
  .menuGrid{grid-template-columns:repeat(2,1fr)}
}

@media(max-width:520px){
  .grid{grid-template-columns:1fr}
  .menuGrid{grid-template-columns:1fr}
  .actions{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Heslo">
  <button onclick="login()">Přihlásit</button>
</div>

<div id="adminPanel">

<div class="topbar">
  <div class="logoTitle">🍣 SushiBoxPils Admin</div>
  <div style="display:flex;gap:8px">
    <button onclick="enableSound()">🔔 Alarm</button>
    <button class="logout" onclick="logout()">Odhlásit</button>
  </div>
</div>

<div class="container">

<div class="tabs">
  <button class="tab active" onclick="showTab('menuTab', this)">Menu</button>
</div>

<div id="menuTab" class="panel">
  <h2>Moje menu</h2>
  <div id="list">Načítám...</div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCECFacCTVZpt9EM5HyDF98cVSrJNrIw9A",
  authDomain: "sushiboxpils.firebaseapp.com",
  projectId: "sushiboxpils"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const productsRef = collection(db, "products");

/* LOGIN DEMO */
window.login = () => {
  if(document.getElementById("email").value === "admin" &&
     document.getElementById("password").value === "admin"){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("adminPanel").style.display="block";
  } else {
    alert("Špatné údaje");
  }
};

window.logout = () => {
  document.getElementById("loginBox").style.display="block";
  document.getElementById("adminPanel").style.display="none";
};

window.showTab = (id,btn)=>{
  document.querySelectorAll(".panel").forEach(p=>p.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
};

/* LOAD MENU */
onSnapshot(productsRef,snap=>{
  const list = document.getElementById("list");
  list.innerHTML = '<div class="menuGrid"></div>';
  const grid = list.querySelector(".menuGrid");

  snap.forEach(d=>{
    const i=d.data();
    grid.innerHTML+=`
    <div class="item">
      ${i.img?`<img src="${i.img}">`:""}
      <h3>${i.name}</h3>
      <p>${i.desc||""}</p>
      <b>${i.price} Kč</b>
    </div>`;
  });
});
</script>

</body>
</html>
