<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin SushiBoxPils</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial;background:#070707;color:white;margin:0}
button{border:0;border-radius:8px;padding:8px 10px;font-weight:bold;cursor:pointer;color:white;background:#df1f2d;font-size:12px}
input,textarea,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #333;background:#111;color:white}

#loginBox{max-width:400px;margin:80px auto;background:#111;padding:20px;border-radius:16px;text-align:center}
#adminPanel{display:none}

.topbar{background:#000;padding:12px;display:flex;justify-content:space-between}
.container{padding:15px;max-width:1200px;margin:auto}

.ordersGrid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.order{
  border:1px solid #333;
  border-radius:12px;
  padding:10px;
  background:#151515;
}

.orderTotal{font-size:18px;color:#c9974c}

.orderActions{
  display:flex;
  gap:5px;
  flex-wrap:wrap;
  margin-top:8px;
}

.work{background:#ca8a04}
.doneBtn{background:#2563eb}
.ship{background:#7c3aed}
.receiptBtn{background:#0f766e}
.delete{background:#444}

.menuItemsGrid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.item{background:#151515;padding:8px;border-radius:10px}
.item img{width:100%;height:80px;object-fit:cover}

@media(max-width:800px){
  .ordersGrid{grid-template-columns:1fr}
  .menuItemsGrid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<body>

<div id="loginBox">
<h2>Admin Login</h2>
<input id="email">
<input id="password" type="password">
<button onclick="login()">Login</button>
</div>

<div id="adminPanel">

<div class="topbar">
<div>🍣 SushiBoxPils Admin</div>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<h2>Objednávky</h2>
<div id="ordersList" class="ordersGrid"></div>

<h2>Menu / Upravit menu</h2>
<div id="list" class="menuItemsGrid"></div>

<h2>Přidat jídlo</h2>
<input id="name" placeholder="Název">
<input id="price" type="number" placeholder="Cena">
<input id="img" placeholder="URL obrázku">
<button onclick="addProduct()">Přidat</button>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyCECFacCTVZpt9EM5HyDF98cVSrJNrIw9A",
  authDomain: "sushiboxpils.firebaseapp.com",
  projectId: "sushiboxpils"
});

const db = getFirestore(app);
const auth = getAuth(app);

window.login = async ()=>{
  await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.logout = ()=>signOut(auth);

onAuthStateChanged(auth,(u)=>{
  loginBox.style.display=u?"none":"block";
  adminPanel.style.display=u?"block":"none";
});

function cleanPhone(p){
  p=(p||"").replace(/\s/g,"").replace("+","");
  if(p.startsWith("0")) p="420"+p.slice(1);
  return p;
}

function sendWA(phone,text){
  window.open("https://wa.me/"+cleanPhone(phone)+"?text="+encodeURIComponent(text));
}

window.printReceipt=(o)=>{
  const w=window.open("","");
  let items="";
  o.items.forEach(i=>{
    items+=`<p>${i.qty}× ${i.name} - ${i.lineTotal} Kč</p>`;
  });
  w.document.write(`
  <body style="font-family:Arial">
  <h2>SushiBoxPils</h2>
  ${items}
  <h3>${o.total} Kč</h3>
  <script>window.print()<\/script>
  </body>`);
};

onSnapshot(collection(db,"orders"),snap=>{
  ordersList.innerHTML="";
  snap.forEach(d=>{
    const o=d.data();

    ordersList.innerHTML+=`
    <div class="order">
      <b>${o.customerName}</b>
      <div class="orderTotal">${o.total} Kč</div>

      <div class="orderActions">
        <button class="work" onclick="updateStatus('${d.id}','preparing','${o.customerPhone}')">Nhận</button>
        <button class="doneBtn" onclick="updateStatus('${d.id}','done','${o.customerPhone}')">Xong</button>
        <button class="ship" onclick="updateStatus('${d.id}','shipping','${o.customerPhone}')">Ship</button>
        <button class="receiptBtn" onclick='printReceipt(${JSON.stringify(o)})'>In</button>
        <button class="delete" onclick="del('${d.id}')">X</button>
      </div>
    </div>`;
  });
});

window.updateStatus=async(id,status,phone)=>{
  await updateDoc(doc(db,"orders",id),{status});

  let text="";
  if(status==="preparing") text="Objednávka se připravuje";
  if(status==="done") text="Objednávka je hotová";
  if(status==="shipping") text="Objednávka je na cestě";

  sendWA(phone,text);
};

window.del=id=>deleteDoc(doc(db,"orders",id));

onSnapshot(collection(db,"products"),snap=>{
  list.innerHTML="";
  snap.forEach(d=>{
    const i=d.data();
    list.innerHTML+=`
    <div class="item">
      <img src="${i.img}">
      <b>${i.name}</b>
      <div>${i.price} Kč</div>
      <button onclick="removeProduct('${d.id}')">X</button>
    </div>`;
  });
});

window.addProduct=()=>addDoc(collection(db,"products"),{
  name:name.value,
  price:Number(price.value),
  img:img.value
});

window.removeProduct=id=>deleteDoc(doc(db,"products",id));

</script>
</body>
</html>
