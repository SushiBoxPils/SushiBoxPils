<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin SushiBoxPils</title>

<style>
body{
  font-family:Arial;
  background:#070707;
  color:white;
  margin:0;
  padding:20px;
}

#loginBox{
  max-width:400px;
  margin:100px auto;
  background:#111;
  padding:25px;
  border-radius:15px;
  text-align:center;
}

#adminPanel{
  display:none;
}

input,textarea,select,button{
  width:100%;
  padding:13px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:white;
}

button{
  background:#df1f2d;
  font-weight:bold;
  cursor:pointer;
}

.item,.order{
  border:1px solid #444;
  border-radius:14px;
  padding:15px;
  margin:14px 0;
  background:#111;
}

.item img{
  width:100%;
  max-height:180px;
  object-fit:cover;
  border-radius:10px;
}

.delete{
  background:#444;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Heslo">
  <button onclick="login()">Přihlásit</button>
</div>

<!-- ADMIN -->
<div id="adminPanel">

<h1>Admin SushiBoxPils</h1>

<button onclick="logout()" style="background:#555;margin-bottom:20px;">
Odhlásit
</button>

<h2>Přidat jídlo</h2>

<input id="name" placeholder="Název jídla">

<select id="category">
  <option value="roll">Rolls</option>
  <option value="nigiri">Nigiri</option>
  <option value="set">Sety</option>
  <option value="party">Party boxy</option>
</select>

<textarea id="desc" placeholder="Popis"></textarea>

<input id="price" type="number" placeholder="Cena Kč">

<input id="img" placeholder="Odkaz na obrázek">

<button id="addBtn">Přidat jídlo</button>

<h2>Moje menu</h2>
<div id="list"></div>

<h2>Objednávky</h2>
<div id="ordersList"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCECFacCTVZpt9EM5HyDF98cVSrJNrIw9A",
  authDomain: "sushiboxpils.firebaseapp.com",
  projectId: "sushiboxpils",
  storageBucket: "sushiboxpils.firebasestorage.app",
  messagingSenderId: "296051969254",
  appId: "1:296051969254:web:cce432ad7060cbc32a3f27"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const productsRef = collection(db, "products");
const ordersRef = collection(db, "orders");

const list = document.getElementById("list");
const ordersList = document.getElementById("ordersList");

/* LOGIN */
window.login = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  try{
    await signInWithEmailAndPassword(auth, email, pass);
  }catch(e){
    alert("Špatné přihlášení!");
  }
};

/* LOGOUT */
window.logout = async () => {
  await signOut(auth);
};

/* AUTH STATE */
onAuthStateChanged(auth, (user) => {
  if(user){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("adminPanel").style.display = "none";
  }
});

/* ADD PRODUCT */
document.getElementById("addBtn").onclick = async () => {
  const item = {
    name: document.getElementById("name").value,
    category: document.getElementById("category").value,
    desc: document.getElementById("desc").value,
    price: Number(document.getElementById("price").value),
    img: document.getElementById("img").value,
    createdAt: serverTimestamp()
  };

  if (!item.name || !item.price) {
    alert("Vyplň název a cenu.");
    return;
  }

  await addDoc(productsRef, item);

  document.getElementById("name").value = "";
  document.getElementById("desc").value = "";
  document.getElementById("price").value = "";
  document.getElementById("img").value = "";
};

/* DELETE PRODUCT */
window.removeProduct = async (id) => {
  await deleteDoc(doc(db, "products", id));
};

/* DELETE ORDER */
window.deleteOrder = async (id) => {
  await deleteDoc(doc(db, "orders", id));
};

/* SHOW PRODUCTS */
onSnapshot(productsRef, (snapshot) => {
  list.innerHTML = "";

  snapshot.forEach((docSnap) => {
    const item = docSnap.data();

    list.innerHTML += `
      <div class="item">
        ${item.img ? `<img src="${item.img}">` : ""}
        <h3>${item.name}</h3>
        <p>${item.desc || ""}</p>
        <strong>${item.price} Kč</strong>
        <button class="delete" onclick="removeProduct('${docSnap.id}')">Smazat</button>
      </div>
    `;
  });
});

/* SHOW ORDERS */
onSnapshot(ordersRef, (snapshot) => {
  ordersList.innerHTML = "";

  snapshot.forEach((docSnap) => {
    const order = docSnap.data();

    let itemsHTML = "";
    order.items.forEach(item => {
      itemsHTML += `<p>${item.qty}× ${item.name} (${item.lineTotal} Kč)</p>`;
    });

    ordersList.innerHTML += `
      <div class="order">
        <h3>Objednávka</h3>
        <p>Jméno: ${order.customerName}</p>
        <p>Telefon: ${order.customerPhone}</p>
        <p>Poznámka: ${order.customerNote}</p>
        <hr>
        ${itemsHTML}
        <hr>
        <strong>${order.total} Kč</strong>
        <button class="delete" onclick="deleteOrder('${docSnap.id}')">Smazat objednávku</button>
      </div>
    `;
  });
});
</script>

</body>
</html>
