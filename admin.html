<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin SushiBoxPils</title>

<style>
body{font-family:Arial;background:#070707;color:white;margin:0;padding:20px}
#loginBox{max-width:400px;margin:100px auto;background:#111;padding:25px;border-radius:15px;text-align:center}
#adminPanel{display:none}
input,textarea,select,button{width:100%;padding:13px;margin:8px 0;border-radius:10px;border:1px solid #333;background:#111;color:white;box-sizing:border-box}
button{background:#df1f2d;font-weight:bold;cursor:pointer}
.item,.order{border:1px solid #444;border-radius:14px;padding:15px;margin:14px 0;background:#111}
.item img,#preview{width:100%;max-height:220px;object-fit:cover;border-radius:10px}
.delete{background:#444}
.confirm{background:#16a34a}
.upload{background:#c9974c;color:black}
.logout{background:#555}
.notice{background:#181818;border:1px solid #333;padding:12px;border-radius:10px;margin:12px 0;color:#ddd}
.status{display:inline-block;padding:6px 10px;border-radius:20px;background:#7f1d1d;color:#fff;margin-bottom:8px}
.status.done{background:#14532d}
</style>
</head>

<body>

<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Heslo">
  <button onclick="login()">Přihlásit</button>
</div>

<div id="adminPanel">

<h1>Admin SushiBoxPils</h1>
<button class="logout" onclick="logout()">Odhlásit</button>

<div class="notice">
  🔔 Bấm <b>Zapnout alarm</b> một lần. Khi có đơn mới, chuông kêu liên tục. Bấm <b>Potvrdit objednávku</b> để tắt chuông.
</div>

<button onclick="enableSound()">🔔 Zapnout alarm</button>

<h2>Přidat jídlo</h2>

<input id="name" placeholder="Název jídla">

<select id="category">
  <option value="roll">Rolls</option>
  <option value="nigiri">Nigiri</option>
  <option value="set">Sety</option>
  <option value="party">Party boxy</option>
</select>

<textarea id="desc" placeholder="Popis"></textarea>
<input id="price" type="number" placeholder="Cena Kč">

<h3>Obrázek</h3>
<input id="fileInput" type="file" accept="image/*">
<button class="upload" onclick="uploadImage()">Nahrát obrázek</button>
<p id="uploadStatus"></p>
<img id="preview" style="display:none">

<input id="img" placeholder="URL obrázku">

<button id="addBtn">Přidat jídlo</button>

<h2>Menu</h2>
<div id="list"></div>

<h2>Objednávky</h2>
<div id="ordersList"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCECFacCTVZpt9EM5HyDF98cVSrJNrIw9A",
  authDomain: "sushiboxpils.firebaseapp.com",
  projectId: "sushiboxpils",
  storageBucket: "sushiboxpils.firebasestorage.app",
  messagingSenderId: "296051969254",
  appId: "1:296051969254:web:cce432ad7060cbc32a3f27"
};

const IMGBB_API_KEY = "2e6fe874c4c5b44a0729722c86166f0d";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const productsRef = collection(db, "products");
const ordersRef = collection(db, "orders");

let audioCtx = null;
let soundEnabled = false;
let firstOrdersLoad = true;
let lastOrderCount = 0;
let alarmInterval = null;

window.enableSound = () => {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  soundEnabled = true;

  playBeep(900,0,0.15);
  alert("Alarm zapnut.");
};

function playBeep(freq, start, duration){
  if(!audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "square";
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime + start);

  gain.gain.setValueAtTime(0.0001, audioCtx.currentTime + start);
  gain.gain.exponentialRampToValueAtTime(0.45, audioCtx.currentTime + start + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + start + duration);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(audioCtx.currentTime + start);
  osc.stop(audioCtx.currentTime + start + duration);
}

function playAlarmSound(){
  if(!soundEnabled || !audioCtx) return;

  for(let i = 0; i < 15; i++){
    const start = i * 0.35;
    const freq = i % 2 === 0 ? 900 : 1200;
    playBeep(freq, start, 0.18);
  }
}

function vibratePhone(){
  if(navigator.vibrate){
    navigator.vibrate([700,200,700,200,900,200,900]);
  }
}

function startAlarm(){
  if(alarmInterval) return;

  playAlarmSound();
  vibratePhone();

  alarmInterval = setInterval(() => {
    playAlarmSound();
    vibratePhone();
  }, 6000);
}

function stopAlarm(){
  if(alarmInterval){
    clearInterval(alarmInterval);
    alarmInterval = null;
  }
}

function notifyNewOrder(){
  startAlarm();
  alert("🚨 NOVÁ OBJEDNÁVKA!");
}

window.login = async () => {
  try{
    await signInWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("password").value);
  }catch{
    alert("Chyba loginu");
  }
};

window.logout = async () => {
  stopAlarm();
  await signOut(auth);
};

onAuthStateChanged(auth, (user)=>{
  document.getElementById("loginBox").style.display = user ? "none":"block";
  document.getElementById("adminPanel").style.display = user ? "block":"none";
});

window.uploadImage = async () => {
  const file = document.getElementById("fileInput").files[0];
  if(!file){ alert("Vyber obrázek"); return; }

  document.getElementById("uploadStatus").innerText="Nahrávám...";

  const formData=new FormData();
  formData.append("image",file);

  const res=await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`,{
    method:"POST",
    body:formData
  });

  const data=await res.json();

  if(data.success){
    document.getElementById("img").value=data.data.url;
    document.getElementById("preview").src=data.data.url;
    document.getElementById("preview").style.display="block";
    document.getElementById("uploadStatus").innerText="OK";
  } else {
    document.getElementById("uploadStatus").innerText="Chyba uploadu";
  }
};

document.getElementById("addBtn").onclick = async ()=>{
  const productName = document.getElementById("name").value.trim();
  const productCategory = document.getElementById("category").value;
  const productDesc = document.getElementById("desc").value.trim();
  const productPrice = Number(document.getElementById("price").value);
  const productImg = document.getElementById("img").value.trim();

  if(!productName || !productPrice){
    alert("Vyplň název a cenu");
    return;
  }

  await addDoc(productsRef,{
    name: productName,
    category: productCategory,
    desc: productDesc,
    price: productPrice,
    img: productImg,
    createdAt: serverTimestamp()
  });

  document.getElementById("name").value="";
  document.getElementById("desc").value="";
  document.getElementById("price").value="";
  document.getElementById("img").value="";
  document.getElementById("fileInput").value="";
  document.getElementById("preview").style.display="none";
  document.getElementById("uploadStatus").innerText="";
  alert("Jídlo přidáno.");
};

window.removeProduct = async id=>{
  if(confirm("Opravdu smazat jídlo?")){
    await deleteDoc(doc(db,"products",id));
  }
};

window.confirmOrder = async id=>{
  await updateDoc(doc(db,"orders",id),{
    status:"confirmed",
    confirmedAt:serverTimestamp()
  });

  stopAlarm();
  alert("Objednávka potvrzena.");
};

window.deleteOrder = async id=>{
  if(confirm("Opravdu smazat objednávku?")){
    await deleteDoc(doc(db,"orders",id));
    stopAlarm();
  }
};

onSnapshot(productsRef,snap=>{
  const list = document.getElementById("list");
  list.innerHTML="";

  if(snap.empty){
    list.innerHTML="<p>Zatím žádné jídlo.</p>";
    return;
  }

  snap.forEach(d=>{
    const i=d.data();
    list.innerHTML+=`
    <div class="item">
      ${i.img?`<img src="${i.img}">`:""}
      <h3>${i.name}</h3>
      <p>${i.desc||""}</p>
      <b>${i.price} Kč</b>
      <button class="delete" onclick="removeProduct('${d.id}')">Smazat</button>
    </div>`;
  });
});

onSnapshot(ordersRef,snap=>{
  const ordersList = document.getElementById("ordersList");
  ordersList.innerHTML="";

  if(firstOrdersLoad){
    lastOrderCount=snap.size;
    firstOrdersLoad=false;
  }else if(snap.size>lastOrderCount){
    notifyNewOrder();
    lastOrderCount=snap.size;
  }else{
    lastOrderCount=snap.size;
  }

  if(snap.empty){
    ordersList.innerHTML="<p>Zatím žádné objednávky.</p>";
    stopAlarm();
    return;
  }

  snap.forEach(d=>{
    const o=d.data();
    const isConfirmed = o.status === "confirmed";

    let items="";
    o.items?.forEach(i=>{
      items+=`<p>${i.qty}× ${i.name} — ${i.lineTotal || (i.qty*i.price)} Kč</p>`;
    });

    ordersList.innerHTML+=`
    <div class="order">
      <span class="status ${isConfirmed ? "done" : ""}">
        ${isConfirmed ? "POTVRZENO" : "NOVÁ OBJEDNÁVKA"}
      </span>
      <h3>Objednávka</h3>
      <p><b>Jméno:</b> ${o.customerName || "-"}</p>
      <p><b>Telefon:</b> ${o.customerPhone || "-"}</p>
      <p><b>Poznámka:</b> ${o.customerNote || "-"}</p>
      <hr>
      ${items}
      <hr>
      <b>Celkem: ${o.total || 0} Kč</b>

      ${!isConfirmed ? `<button class="confirm" onclick="confirmOrder('${d.id}')">Potvrdit objednávku</button>` : ""}
      <button class="delete" onclick="deleteOrder('${d.id}')">Smazat objednávku</button>
    </div>`;
  });
});
</script>

</body>
</html>
